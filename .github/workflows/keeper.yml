name: Keeper — Settle Expired Bets

on:
  schedule:
    - cron: "0 0 * * 0" # every Sunday at midnight UTC
  workflow_dispatch:     # allow manual trigger from GitHub UI

jobs:
  run-keeper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: keeper/package-lock.json

      - name: Install keeper dependencies
        working-directory: keeper
        run: npm install

      - name: Compile contracts (generate ABI)
        run: npm install --legacy-peer-deps && npx hardhat compile

      - name: Run keeper
        working-directory: keeper
        env:
          RPC_URL: ${{ secrets.KEEPER_RPC_URL }}
          KEEPER_PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
          BET_REGISTRY_ADDRESS: ${{ secrets.BET_REGISTRY_ADDRESS }}
          SUBGRAPH_URL: ${{ secrets.SUBGRAPH_URL }}
        run: node index.js
